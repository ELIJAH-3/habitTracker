<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rate Your Day</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <main class="stage" id="printRoot">
        <svg id="tracker"
             viewBox="-520 -520 1040 1040"
             preserveAspectRatio="xMidYMid meet"
             xmlns="http://www.w3.org/2000/svg"></svg>
    </main>

    <div class="floating-controls no-print" id="controls">
        <button id="themeBtn"    title="Toggle light / dark theme">theme</button>
        <button id="syncBtn"     title="Force sync with Cloud">sync</button>
        <button id="pdfBtn"      title="Export as PDF">pdf</button>
        <button id="printBtn"    title="Print (or save as PDF)">print</button>
        <button id="resetBtn"    title="Clear all ratings" class="danger">reset</button>
    </div>
    <div id="statusMsg" class="status no-print"></div>

    <!-- Hamburger Menu -->
    <button id="notesMenuBtn" class="hamburger-btn no-print" title="Toggle Notes">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
    </button>

    <!-- Sidebar -->
    <div id="notesSidebar" class="sidebar no-print">
        <div class="sidebar-header">
            <h2>Notes</h2>
            <button id="closeSidebarBtn" class="close-btn">&times;</button>
        </div>
        <div id="notesList" class="notes-list"></div>
    </div>

    <div id="entryModal" class="modal hidden no-print">
        <div class="modal-content">
            <h3 id="modalDate"></h3>
            <div class="input-group">
                <label for="modalRating">Rating (1-10)</label>
                <input type="number" id="modalRating" min="1" max="10" step="1">
            </div>
            <div class="input-group">
                <label for="modalNote">Note (optional)</label>
                <textarea id="modalNote" rows="4" placeholder="How was your day?"></textarea>
            </div>
            <div class="modal-actions">
                <button id="modalSaveBtn">Save</button>
                <button id="modalClearBtn" class="danger">Clear</button>
                <button id="modalCancelBtn">Cancel</button>
            </div>
        </div>
    </div>

    <script src="vendor/html2canvas.min.js"></script>
    <script src="vendor/jspdf.umd.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
